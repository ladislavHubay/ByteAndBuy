<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <title>ByteAndBuy Test</title>
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
</head>
<body>

<h1>ByteAndBuy - Test UI</h1>

<button onclick="createGame()">Vytvor hru</button>

<p><b>Game ID:</b> <span id="gameId"></span></p>

<label for="gameIdInput"></label><input id="gameIdInput" placeholder="Zadaj Game ID">
<button onclick="setGameId()">Použiť ID</button>

<hr>

<h3>Lobby</h3>
<label for="playerName"></label><input id="playerName" placeholder="Meno hraca">
<button onclick="joinGame()">Join</button>
<button onclick="startGame()">Start</button>

<p>
    <b>Hrac:</b>
    <label for="playerId"></label><select id="playerId"></select>
</p>

<hr>

<button onclick="roll()">Roll</button>
<button onclick="draw()">Draw Card</button>
<button onclick="buy()">Buy</button>
<button onclick="skip()">Skip</button>
<button onclick="state()">State</button>
<button onclick="leaveGame()">Leave</button>

<hr>

<h3>Vystup:</h3>
<pre id="output"></pre>

<script>
    let gameId = null;
    let players = [];
    const baseUrl = `http://${location.hostname}:8080/game`;

    function setOutput(data) {
        document.getElementById("output").textContent =
            JSON.stringify(data, null, 2);
    }

    function updatePlayersFrom(data) {
        if (Array.isArray(data.players)) {
            players = data.players;
        } else if (data.id && data.name) {
            const existingIndex = players.findIndex(player => player.id === data.id);
            if (existingIndex >= 0) {
                players[existingIndex] = data;
            } else {
                players.push(data);
            }
        }

        renderPlayerSelect();
    }

    function renderPlayerSelect() {
        const selectedPlayerId = document.getElementById("playerId").value;
        const activePlayers = players.filter(player => player.inGame !== false);
        document.getElementById("playerId").innerHTML = players
            .filter(player => player.inGame !== false)
            .map(player => `<option value="${player.id}">${player.name}</option>`)
            .join("");

        if (activePlayers.some(player => player.id === selectedPlayerId)) {
            document.getElementById("playerId").value = selectedPlayerId;
        }
    }

    function getSelectedPlayerId() {
        const playerId = document.getElementById("playerId").value;
        if (!playerId) {
            alert("Vyber hraca");
            return null;
        }

        return playerId;
    }

    function playerActionOptions() {
        const playerId = getSelectedPlayerId();
        if (!playerId) return null;

        return {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ playerId })
        };
    }

    async function request(url, options = {}) {
        const res = await fetch(url, options);
        const contentType = res.headers.get("content-type") || "";
        const data = contentType.includes("application/json")
            ? await res.json()
            : await res.text();

        if (!res.ok) {
            setOutput({
                status: res.status,
                error: data
            });
            throw new Error(`Request failed: ${res.status}`);
        }

        return data;
    }

    function requireGame() {
        if (!gameId) {
            alert("Najprv vytvor hru");
            return false;
        }

        return true;
    }

    async function createGame() {
        gameId = await request(baseUrl + "/create", { method: "POST" });
        document.getElementById("gameId").textContent = gameId;

        connectWS();

        setOutput({ message: "Game created", gameId });
    }

    async function joinGame() {
        if (!requireGame()) return;

        const playerNameInput = document.getElementById("playerName");
        const playerName = playerNameInput.value.trim();
        if (!playerName) return alert("Zadaj meno hraca");

        const data = await request(`${baseUrl}/${gameId}/join`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ playerName })
        });

        playerNameInput.value = "";
        updatePlayersFrom(data);
        setOutput(data);
    }

    async function startGame() {
        if (!requireGame()) return;

        const data = await request(`${baseUrl}/${gameId}/start`, { method: "POST" });
        updatePlayersFrom(data);
        setOutput(data);
    }

    async function roll() {
        if (!requireGame()) return;

        const options = playerActionOptions();
        if (!options) return;

        const data = await request(`${baseUrl}/${gameId}/roll`, options);
        updatePlayersFrom(data);
        setOutput(data);
    }

    async function draw() {
        if (!requireGame()) return;

        const options = playerActionOptions();
        if (!options) return;

        const data = await request(`${baseUrl}/${gameId}/draw`, options);
        updatePlayersFrom(data);
        setOutput(data);
    }

    async function buy() {
        if (!requireGame()) return;

        const options = playerActionOptions();
        if (!options) return;

        const data = await request(`${baseUrl}/${gameId}/buy`, options);
        updatePlayersFrom(data);
        setOutput(data);
    }

    async function skip() {
        if (!requireGame()) return;

        const options = playerActionOptions();
        if (!options) return;

        const data = await request(`${baseUrl}/${gameId}/skip`, options);
        updatePlayersFrom(data);
        setOutput(data);
    }

    async function state() {
        if (!requireGame()) return;

        const data = await request(`${baseUrl}/${gameId}/state`);
        updatePlayersFrom(data);
        setOutput(data);
    }

    async function leaveGame() {
        if (!requireGame()) return;

        const options = playerActionOptions();
        if (!options) return;

        const data = await request(`${baseUrl}/${gameId}/leave`, options);
        updatePlayersFrom(data);
        setOutput(data);
    }

    function setGameId() {
        const input = document.getElementById("gameIdInput").value.trim();

        if (!input) {
            alert("Zadaj Game ID");
            return;
        }

        gameId = input;
        document.getElementById("gameId").textContent = gameId;

        setOutput({ message: "Game ID nastavené", gameId });

        connectWS();
    }

    let stompClient = null;

    function connectWS() {
        if (!gameId) return;

        if (stompClient !== null) {
            stompClient.disconnect();
        }

        const socket = new SockJS(`http://${location.hostname}:8080/ws`);
        stompClient = Stomp.over(socket);

        stompClient.connect({}, function () {
            setOutput({ ws: "CONNECTED" });

            stompClient.subscribe("/topic/game/" + gameId, function (message) {
                setOutput({
                    wsMessage: message.body
                });
            });
        });
    }
</script>

</body>
</html>
